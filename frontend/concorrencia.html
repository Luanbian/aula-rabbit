<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concorrência sem fila</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="concorrencia.css" />
  </head>
  <body>
    <main class="card card-wide">
      <h1>3 requisições, sem fila</h1>
      <p class="subtitle">
        As tarefas abaixo não têm nenhuma relação entre si. Ainda assim, sem uma
        fila, o servidor processa uma de cada vez.
      </p>
      <button type="button" id="start">Disparar as 3 requisições</button>

      <table class="task-table">
        <thead>
          <tr>
            <th>Tarefa</th>
            <th>Status</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Duração</th>
          </tr>
        </thead>
        <tbody id="task-table-body"></tbody>
      </table>
    </main>

    <script src="concorrencia.js"></script>
  </body>
</html>
