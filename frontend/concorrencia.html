<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Concorrência sem fila</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="stylesheet" href="concorrencia.css" />
  </head>
  <body>
    <main class="card card-wide">
      <h1>3 requisições, sem fila</h1>
      <p class="subtitle">
        As 3 tarefas abaixo não têm nenhuma relação entre si e são disparadas ao
        mesmo tempo. Sem uma fila, o servidor processa uma de cada vez — e a
        tela fica travada, três vezes seguidas.
      </p>
      <button type="button" id="start">Disparar as 3 requisições</button>

      <ul id="resultado" class="resultado"></ul>
    </main>

    <div id="overlay" class="overlay" hidden>
      <div class="spinner"></div>
      <p id="overlay-label" class="overlay-label"></p>
    </div>

    <script src="concorrencia.js"></script>
  </body>
</html>
